<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PiX'CRAFT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root{--bg:#0f172a;--card:#e0f2fe;--accent:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:'Press Start 2P', monospace;background:var(--bg);color:white}

header{position:sticky;top:0;background:#020617;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}

.logo{color:var(--accent);font-size:18px;cursor:pointer}

.search{width:100%;max-width:400px;padding:10px;border:4px solid black;font-family:inherit}

.account{background:var(--card);color:black;padding:10px;border:4px solid black;cursor:pointer;width:100%;max-width:400px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}

.account img{width:24px;height:24px;border-radius:50%}

main{padding:20px;text-align:center}

.card{background:var(--card);color:black;padding:20px;border:6px solid black;margin-top:20px}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">PiX'CRAFT</div>
  <input class="search" placeholder="Rechercher...">
  <div class="account" onclick="login()" id="accountBtn">Se connecter</div>
</header>

<main id="home">
  <h2>Accueil</h2>
  <div class="card">
    Bienvenue sur PiX'CRAFT 🎮<br><br>
    Clique sur "Se connecter" pour utiliser ton compte Google.

    <div id="googleBtn" style="margin-top:15px"></div>
  </div>
</main>

<script>
const CLIENT_ID = "667765343545-2mcoq2s9meqraha53rboqa91qlosbtf0.apps.googleusercontent.com";

function goHome(){
  document.getElementById('home').scrollIntoView({behavior:'smooth'});
}

function login(){
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById("googleBtn"),
    { theme: "outline", size: "large" }
  );

  google.accounts.id.prompt();
}

function handleCredentialResponse(response){
  const data = parseJwt(response.credential);

  // Sauvegarde
  localStorage.setItem("user", JSON.stringify(data));

  showUser(data);
}

function showUser(user){
  const btn = document.getElementById("accountBtn");
  btn.innerHTML = "";

  if(user.picture){
    const img = document.createElement("img");
    img.src = user.picture;
    btn.appendChild(img);
  }

  const name = document.createElement("span");
  name.textContent = user.name;
  btn.appendChild(name);

  btn.onclick = logout;
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function parseJwt(token){
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}

// Auto login si déjà connecté
window.onload = () => {
  const savedUser = localStorage.getItem("user");
  if(savedUser){
    showUser(JSON.parse(savedUser));
  }
};
</script>

</body>
</html>
