<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PiX'CRAFT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:'Press Start 2P', monospace;background:#0f172a;color:white}
header{background:#020617;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.logo{color:#22c55e;cursor:pointer}
.search{width:100%;max-width:400px;padding:10px;border:4px solid black}
.account{background:#e0f2fe;color:black;padding:10px;border:4px solid black;cursor:pointer;width:100%;max-width:400px;text-align:center}
main{padding:20px;text-align:center}
.card{background:#e0f2fe;color:black;padding:20px;border:6px solid black;margin-top:20px}
.menu{position:fixed;inset:0;background:white;color:black;display:none;flex-direction:column;justify-content:center;align-items:center;gap:20px}
.logout{background:#ef4444;color:black;border:4px solid black;padding:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal-box{background:white;color:black;padding:20px;border:6px solid black;text-align:center}
</style>
</head>
<body>

<header>
<div class="logo">PiX'CRAFT</div>
<input class="search" id="search" placeholder="Rechercher..." onkeydown="if(event.key==='Enter'){search()}">
<div class="account" onclick="login()" id="accountBtn">Se connecter</div>
</header>

<main>
<div class="card" id="results">🔎 Appuie sur Entrée pour rechercher</div>
</main>

<div class="menu" id="menu">
<button>Changer la langue</button>
<button class="logout" onclick="logout()">Se déconnecter</button>
<button onclick="closeMenu()">Fermer</button>
</div>

<div class="modal" id="setupModal">
<div class="modal-box">
<div>Choisis ta langue</div>
<select id="lang"><option>Français</option><option>English</option></select>
<div>Ton pseudo</div>
<input id="pseudo">
<button onclick="saveSetup()">Valider</button>
</div>
</div>

<script>
const CLIENT_ID="667765343545-2mcoq2s9meqraha53rboqa91qlosbtf0.apps.googleusercontent.com";
let user=null;

function login(){
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handle});
  google.accounts.id.prompt();
}

function handle(res){
  user=parseJwt(res.credential);
  localStorage.setItem('user',JSON.stringify(user));
  document.getElementById('accountBtn').innerText=user.name;
  if(!localStorage.getItem('setup')){
    document.getElementById('setupModal').style.display='flex';
  }
}

function saveSetup(){
  localStorage.setItem('setup','ok');
  document.getElementById('setupModal').style.display='none';
}

function logout(){localStorage.clear();location.reload()}
function closeMenu(){document.getElementById('menu').style.display='none'}

function search(){
  document.getElementById('results').innerHTML="❌ Aucun résultat trouvé";
}

function parseJwt(t){
  const b=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b).split('').map(c=>'%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

window.onload=()=>{
  const u=localStorage.getItem('user');
  if(u){user=JSON.parse(u);document.getElementById('accountBtn').innerText=user.name}
}
</script>

</body>
</html>
