<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PiX'CRAFT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root{--bg:#0f172a;--card:#e0f2fe;--accent:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:'Press Start 2P', monospace;background:var(--bg);color:white}

header{position:sticky;top:0;background:#020617;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.logo{color:var(--accent);font-size:18px;cursor:pointer}
.search{width:100%;max-width:400px;padding:10px;border:4px solid black;font-family:inherit}

.account{background:var(--card);color:black;padding:10px;border:4px solid black;cursor:pointer;width:100%;max-width:400px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.account img{width:24px;height:24px;border-radius:50%}

main{padding:20px;text-align:center}
.card{background:var(--card);color:black;padding:20px;border:6px solid black;margin-top:20px}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#e0f2fe;
  border-top:6px solid black;
  padding:20px;
  display:none;
  flex-direction:column;
  gap:15px;
  color:black;
}

.menu button{
  font-family:'Press Start 2P', monospace;
  padding:12px;
  border:4px solid black;
  background:white;
  cursor:pointer;
}

.logout{
  background:#ef4444;
  color:white;
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">PiX'CRAFT</div>
  <input class="search" placeholder="Rechercher...">
  <div class="account" onclick="accountClick()" id="accountBtn">Se connecter</div>
</header>

<main id="home">
  <h2>Accueil</h2>
  <div class="card">
    Bienvenue sur PiX'CRAFT 🎮
  </div>
</main>

<!-- MENU COMPTE -->
<div class="menu" id="menu">
  <button onclick="closeMenu()">Fermer</button>
  <button class="logout" onclick="logout()">Se déconnecter</button>
</div>

<script>
const CLIENT_ID = "667765343545-2mcoq2s9meqraha53rboqa91qlosbtf0.apps.googleusercontent.com";
let userData = null;

function goHome(){
  document.getElementById('home').scrollIntoView({behavior:'smooth'});
}

function accountClick(){
  if(!userData){
    // connexion directe Google (pas de bouton affiché)
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: handleCredentialResponse
    });

    google.accounts.id.prompt();
  } else {
    openMenu();
  }
}

function handleCredentialResponse(response){
  const data = parseJwt(response.credential);
  localStorage.setItem("user", JSON.stringify(data));
  userData = data;
  showUser(data);
}

function showUser(user){
  const btn = document.getElementById("accountBtn");
  btn.innerHTML = "";

  if(user.picture){
    const img = document.createElement("img");
    img.src = user.picture;
    btn.appendChild(img);
  }

  const name = document.createElement("span");
  name.textContent = user.name;
  btn.appendChild(name);
}

function openMenu(){
  document.getElementById("menu").style.display = "flex";
}

function closeMenu(){
  document.getElementById("menu").style.display = "none";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function parseJwt(token){
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}

// auto login
window.onload = () => {
  const savedUser = localStorage.getItem("user");
  if(savedUser){
    userData = JSON.parse(savedUser);
    showUser(userData);
  }
};
</script>

</body>
</html>
