<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PiX'CRAFT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root{--bg:#0f172a;--card:#e0f2fe;--accent:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:'Press Start 2P', monospace;background:var(--bg);color:white}

header{position:sticky;top:0;background:#020617;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.logo{color:var(--accent);font-size:18px;cursor:pointer}
.search{width:100%;max-width:400px;padding:10px;border:4px solid black;font-family:inherit}

.account{background:var(--card);color:black;padding:10px;border:4px solid black;cursor:pointer;width:100%;max-width:400px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.account img{width:28px;height:28px;border-radius:50%}

main{padding:20px;text-align:center}
.card{background:var(--card);color:black;padding:20px;border:6px solid black;margin-top:20px}

.menu{position:fixed;inset:0;background:#ffffff;padding:30px;display:none;flex-direction:column;gap:20px;color:black;align-items:center;justify-content:center;z-index:999}
.menu button{font-family:'Press Start 2P';padding:14px;border:4px solid black;background:#fff;cursor:pointer}
.logout{background:#ef4444;color:black !important}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:white;color:black;padding:20px;border:6px solid black;text-align:center;width:90%;max-width:400px}
.modal-box input, .modal-box select{margin-top:10px;padding:10px;width:100%;border:3px solid black;font-family:inherit}
.modal-box button{margin-top:15px;padding:10px;border:4px solid black;background:#22c55e;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">PiX'CRAFT</div>
  <input class="search" id="search" placeholder="Rechercher (versions, serveurs, joueurs)..." oninput="search()">
  <div class="account" onclick="accountClick()" id="accountBtn">Se connecter</div>
</header>

<main id="home">
  <h2>Accueil</h2>
  <div class="card" id="results">
    🔎 Résultats apparaîtront ici
  </div>
</main>

<!-- MENU -->
<div class="menu" id="menu">
  <button onclick="changeLanguage()">Changer la langue</button>
  <button class="logout" onclick="logout()">Se déconnecter</button>
  <button onclick="closeMenu()">Fermer</button>
</div>

<!-- FIRST SETUP -->
<div class="modal" id="setupModal">
  <div class="modal-box">
    <div>Choisis ta langue</div>
    <select id="lang">
      <option>Français</option>
      <option>English</option>
    </select>
    <div>Ton pseudo</div>
    <input id="pseudo" placeholder="Pseudo">
    <button onclick="saveSetup()">Valider</button>
  </div>
</div>

<script>
const CLIENT_ID = "667765343545-2mcoq2s9meqraha53rboqa91qlosbtf0.apps.googleusercontent.com";
let userData = null;

const versions = ["1.20","1.19","1.18"];
const servers = ["Hypixel","Mineplex","CubeCraft"];
const users = ["Steve","Alex","Notch"];

function goHome(){document.getElementById('home').scrollIntoView({behavior:'smooth'})}

function accountClick(){
  if(!userData){
    google.accounts.id.initialize({client_id: CLIENT_ID,callback: handleCredentialResponse});
    google.accounts.id.prompt();
  } else openMenu();
}

function handleCredentialResponse(res){
  const data = parseJwt(res.credential);
  localStorage.setItem("user", JSON.stringify(data));
  userData = data;
  showUser(data);

  if(!localStorage.getItem("setup")){
    document.getElementById("setupModal").style.display="flex";
  }
}

function saveSetup(){
  const lang = document.getElementById("lang").value;
  const pseudo = document.getElementById("pseudo").value;
  localStorage.setItem("setup", JSON.stringify({lang,pseudo}));
  document.getElementById("setupModal").style.display="none";
}

function showUser(user){
  const btn=document.getElementById("accountBtn");
  btn.innerHTML="";
  const img=document.createElement("img"); img.src=user.picture;
  const name=document.createElement("span"); name.textContent=user.name;
  btn.appendChild(img); btn.appendChild(name);
}

function openMenu(){document.getElementById("menu").style.display="flex"}
function closeMenu(){document.getElementById("menu").style.display="none"}

function logout(){localStorage.clear();location.reload()}

function changeLanguage(){alert("Langue à modifier (à développer)")}

function search(){
  const q=document.getElementById("search").value.toLowerCase();
  let res="";

  res += "<b>Versions :</b><br>" + versions.filter(v=>v.includes(q)).join(", ") + "<br><br>";
  res += "<b>Serveurs :</b><br>" + servers.filter(s=>s.toLowerCase().includes(q)).join(", ") + "<br><br>";
  res += "<b>Joueurs :</b><br>" + users.filter(u=>u.toLowerCase().includes(q)).join(", ");

  document.getElementById("results").innerHTML = res;
}

function parseJwt(t){
  const b=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b).split('').map(c=>'%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

window.onload=()=>{
  const saved=localStorage.getItem("user");
  if(saved){userData=JSON.parse(saved);showUser(userData)}
}
</script>

</body>
</html>
